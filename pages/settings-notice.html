<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'deep-blue': '#1e3a5f',
                        'safety-orange': '#f97316',
                        'alert-red': '#dc2626',
                        'trend-green': '#059669',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: transparent; }
    </style>
</head>
<body class="p-6">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-xl font-bold text-deep-blue">公告管理</h1>
            <p class="text-slate-500 text-sm">管理APP公告与通知消息</p>
        </div>
        <button class="px-4 py-2 bg-deep-blue text-white rounded-lg hover:bg-blue-800 flex items-center">
            <i class="fa-solid fa-plus mr-2"></i>发布公告
        </button>
    </div>
    
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
        <div class="flex items-center space-x-2">
            <span class="px-4 py-2 bg-deep-blue text-white rounded-lg text-sm cursor-pointer">全部公告</span>
            <span class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm cursor-pointer hover:bg-slate-200">已发布</span>
            <span class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm cursor-pointer hover:bg-slate-200">草稿</span>
            <span class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm cursor-pointer hover:bg-slate-200">已下线</span>
        </div>
    </div>
    
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <table class="w-full">
            <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                    <th class="text-left px-6 py-4 text-sm font-medium text-slate-600">公告标题</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-slate-600">类型</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-slate-600">发布时间</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-slate-600">阅读量</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-slate-600">状态</th>
                    <th class="text-left px-6 py-4 text-sm font-medium text-slate-600">操作</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr class="hover:bg-slate-50">
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <span class="px-2 py-0.5 bg-red-100 text-red-600 text-xs rounded mr-2">置顶</span>
                            <span class="font-medium text-slate-700">系统维护通知</span>
                        </div>
                    </td>
                    <td class="px-6 py-4"><span class="px-2 py-1 bg-red-100 text-red-600 text-xs rounded">重要</span></td>
                    <td class="px-6 py-4 text-slate-500 text-sm">2026-03-26 10:00</td>
                    <td class="px-6 py-4 text-slate-600 text-sm">1,234</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 bg-green-100 text-green-600 text-xs rounded">已发布</span></td>
                    <td class="px-6 py-4">
                        <div class="flex items-center space-x-1">
                            <button class="p-2 text-slate-500 hover:bg-slate-100 rounded"><i class="fa-solid fa-pen"></i></button>
                            <button class="p-2 text-slate-500 hover:bg-slate-100 rounded"><i class="fa-solid fa-arrow-down"></i></button>
                            <button class="p-2 text-red-500 hover:bg-red-50 rounded"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
                <tr class="hover:bg-slate-50">
                    <td class="px-6 py-4 font-medium text-slate-700">新版本发布说明 v2.0</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 bg-blue-100 text-blue-600 text-xs rounded">更新</span></td>
                    <td class="px-6 py-4 text-slate-500 text-sm">2026-03-20 15:00</td>
                    <td class="px-6 py-4 text-slate-600 text-sm">856</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 bg-green-100 text-green-600 text-xs rounded">已发布</span></td>
                    <td class="px-6 py-4">
                        <div class="flex items-center space-x-1">
                            <button class="p-2 text-slate-500 hover:bg-slate-100 rounded"><i class="fa-solid fa-pen"></i></button>
                            <button class="p-2 text-slate-500 hover:bg-slate-100 rounded"><i class="fa-solid fa-arrow-down"></i></button>
                            <button class="p-2 text-red-500 hover:bg-red-50 rounded"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
