<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台登录 - 煤矿安全风向标</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'deep-blue': '#1e3a5f',
                        'safety-orange': '#f97316',
                        'alert-red': '#dc2626',
                    },
                    fontFamily: {
                        'sans': ['Noto Sans SC', 'PingFang SC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
            min-height: 100vh;
        }
        .login-bg {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #1e3a5f 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 1000;
        }
        .toast.error { background: #dc2626; }
        .toast.success { background: #059669; }
    </style>
</head>
<body class="login-bg">
    <div class="min-h-screen flex items-center justify-center p-8">
        <div class="w-full max-w-md">
            <!-- Logo区域 -->
            <div class="text-center mb-8">
                <div class="float-animation inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-safety-orange to-orange-400 shadow-lg shadow-orange-500/30 mb-4">
                    <svg viewBox="0 0 80 80" class="w-12 h-12">
                        <circle cx="40" cy="40" r="4" fill="white"/>
                        <polygon points="40,8 44,35 40,32 36,35" fill="white"/>
                        <polygon points="40,72 44,45 40,48 36,45" fill="white" opacity="0.5"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-white mb-1">煤矿安全风向标</h1>
                <p class="text-slate-300 text-sm">管理后台</p>
            </div>

            <!-- 登录卡片 -->
            <div class="glass-card rounded-2xl p-8 shadow-2xl">
                <h2 class="text-xl font-bold text-deep-blue text-center mb-6">管理员登录</h2>
                
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-2">
                            <i class="fa-solid fa-user mr-2"></i>用户名
                        </label>
                        <input type="text" id="username" 
                               class="input-focus w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-deep-blue focus:outline-none transition-all"
                               placeholder="请输入用户名" value="admin" required>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-2">
                            <i class="fa-solid fa-lock mr-2"></i>密码
                        </label>
                        <div class="relative">
                            <input type="password" id="password" 
                                   class="input-focus w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-deep-blue focus:outline-none transition-all pr-12"
                                   placeholder="请输入密码" value="admin123456" required>
                            <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                <i class="fa-solid fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <label class="flex items-center">
                            <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-slate-300 text-deep-blue focus:ring-deep-blue">
                            <span class="ml-2 text-sm text-slate-600">记住我</span>
                        </label>
                        <a href="#" class="text-sm text-deep-blue hover:underline">忘记密码？</a>
                    </div>
                    
                    <button type="submit" id="loginBtn"
                            class="w-full py-3 bg-gradient-to-r from-deep-blue to-blue-600 text-white font-bold rounded-xl shadow-lg shadow-deep-blue/30 hover:shadow-xl transition-all transform hover:scale-[1.02]">
                        <i class="fa-solid fa-sign-in-alt mr-2"></i>登录
                    </button>
                </form>
                
                <!-- 测试账号提示 -->
                <div class="mt-4 p-3 bg-slate-50 rounded-xl">
                    <p class="text-xs text-slate-500 text-center">
                        默认账号: <span class="font-medium text-deep-blue">admin</span> / 
                        密码: <span class="font-medium text-deep-blue">admin123456</span>
                    </p>
                </div>
                
                <div class="mt-4 pt-4 border-t border-slate-100">
                    <p class="text-center text-xs text-slate-400">
                        <i class="fa-solid fa-shield-halved mr-1"></i>
                        安全登录 · 数据加密传输
                    </p>
                </div>
            </div>

            <!-- 底部信息 -->
            <div class="text-center mt-6 text-slate-400 text-sm">
                <p>© 2026 煤矿安全风向标</p>
            </div>
        </div>
    </div>

    <script>
        // API配置
        const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:8000' : '';
        const TOKEN_KEY = 'coal_safety_token';
        const USER_KEY = 'coal_safety_user';

        // 显示提示
        function showToast(message, type = 'error') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // 原型展示，模拟登录成功直接跳转
            localStorage.setItem(TOKEN_KEY, 'demo_token');
            localStorage.setItem(USER_KEY, JSON.stringify({ name: '管理员', role: 'admin' }));
            window.location.href = 'main.html';
        });
    </script>
</body>
</html>
